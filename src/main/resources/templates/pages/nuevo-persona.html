<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{plantilla/index :: layout('Nueva persona', ~{::#contenido-principal})}" dir="ltr" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Inicio</title>
</head>
<body>

<div id="contenido-principal">
    <div class="col-md-12">
        <div class="card">
            <form th:action="@{/guardar-persona}" th:object="${nuevo}" method="post" class="form-horizontal">
                <div class="card-body">
                    <h4 class="card-title">Registro</h4>

                    <div class="form-group row">
                        <label for="tipoPersonaId"
                               class="col-sm-3 text-end control-label col-form-label">Tipo usuario</label>
                        <div class="col-sm-9">
                            <select th:field="*{tipoPersona.idTipoPersona}" id="tipoPersonaId" class="form-control" required>
                                <option value="">Seleccione</option>
                                <option th:each="tipo : ${tiposPersona}"
                                        th:value="${tipo.idTipoPersona}"
                                        th:text="${tipo.nombre}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group row">
                        <label for="tipoIdentificacion"
                               class="col-sm-3 text-end control-label col-form-label">Tipo identificacion</label>
                        <div class="col-sm-9">
                            <select th:field="*{tipoIdentificacion}" id="tipoIdentificacion" class="form-control" required>
                                <option value="">Seleccione</option>
                                <option value="CEDULA">Cedula</option>
                                <option value="PASAPORTE">Pasaporte</option>
                                <option value="RUC">RUC</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="identificacion"
                               class="col-sm-3 text-end control-label col-form-label">Numero identificacion</label>
                        <div class="col-sm-9">
                            <input th:field="*{identificacion}" type="text" class="form-control" id="identificacion"
                                   placeholder="Nombre" required>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="nombres" class="col-sm-3 text-end control-label col-form-label">Nombres
                            </label>
                        <div class="col-sm-9">
                            <input th:field="*{nombres}" type="text" class="form-control" id="nombres"
                                   placeholder="Codigo referencia" required>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="apellidos" class="col-sm-3 text-end control-label col-form-label">Apellidos
                        </label>
                        <div class="col-sm-9">
                            <input th:field="*{apellidos}" type="text" class="form-control" id="apellidos"
                                   placeholder="Codigo referencia" required>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="sexo" class="col-sm-3 text-end control-label col-form-label">Sexo</label>
                        <div class="col-sm-9">
                            <select th:field="*{sexo}" id="sexo" class="form-control" required>
                                <option value="">Seleccione</option>
                                <option value="M">M</option>
                                <option value="F">F</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="fechaNacimiento"
                               class="col-sm-3 text-end control-label col-form-label">Fecha Nacimiento <small class="text-muted">yyyy-MM-dd</small></label>
                        <div class="col-sm-9">
                            <input th:field="*{fechaNacimiento}" type="date" class="form-control" id="fechaNacimiento"
                                   placeholder="yyyy-MM-dd" pattern="\d{4}-\d{2}-\d{2}"
                                   title="Por favor ingrese la fecha en formato yyyy-MM-dd (Ej: 2005-03-15)"
                                   required>
                        </div>
                    </div>
