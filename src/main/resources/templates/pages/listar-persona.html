<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{plantilla/index :: layout('Listar persona', ~{::#contenido-principal})}" dir="ltr" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Listar Persona</title>
</head>
<body>

<div id="contenido-principal">
    <div class="col-md-12 mt-3">
        <div class="card">
            <div class="card-body d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0">Listado de Personas</h5>
                <a th:href="@{/nuevo-persona}" class="btn btn-primary btn-sm">
                    <i class="mdi mdi-plus"></i> Nueva Persona
                </a>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-bordered mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Tipo Identificación</th>
                        <th>Identificación</th>
                        <th>Nombres y Apellidos</th>
                        <th>Edad</th>
                        <th>Sexo</th>
                        <th>Tipo de Persona</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(datos)}">
                        <td colspan="8" class="text-center text-muted">No hay personas registradas.</td>
                    </tr>
                    <tr th:each="persona, iter : ${datos}">
                        <td th:text="${iter.count}"></td>
                        <td th:text="${persona.tipoIdentificacion}"></td>
                        <td th:text="${persona.identificacion}"></td>
                        <td th:text="${persona.nombres + ' ' + persona.apellidos}"></td>
                        <td th:text="${persona.edad}"></td>
                        <td th:text="${persona.sexo}"></td>
                        <td th:text="${persona.tipoPersona != null ? persona.tipoPersona.nombre : 'Sin asignar'}"></td>
                        <td>
<!--                            <a th:href="@{/editar-persona/{id}(id=${persona.idPersona})}"-->
<!--                               class="btn btn-warning btn-sm">-->
<!--                                <i class="mdi mdi-pencil"></i> Modificar-->
<!--                            </a>-->
                            <a th:href="@{/eliminar-persona/{id}(id=${persona.idPersona})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Está seguro que desea eliminar esta persona?')">
                                <i class="mdi mdi-delete"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>

</html>
